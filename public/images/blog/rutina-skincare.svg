<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7F0F0"/>
      <stop offset="50%" stop-color="#FAFAF9"/>
      <stop offset="100%" stop-color="#EFF3F8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#1D2E4A" stop-opacity="0.07"/>
      <stop offset="65%" stop-color="#1D2E4A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#glow)"/>

  <!-- ícono: 3 pasos de rutina -->
  <g transform="translate(600,300)" fill="none" stroke="#1D2E4A" stroke-width="2" stroke-linecap="round">
    <circle cx="-130" cy="0" r="44"/>
    <circle cx="0" cy="0" r="44" stroke="#C4827A"/>
    <circle cx="130" cy="0" r="44" stroke="#B8966C"/>
    <path d="M-86,0 L-44,0" stroke-dasharray="2 8"/>
    <path d="M44,0 L86,0" stroke-dasharray="2 8"/>
    <circle cx="-130" cy="0" r="6" fill="#1D2E4A" stroke="none"/>
    <circle cx="0" cy="0" r="6" fill="#C4827A" stroke="none"/>
    <circle cx="130" cy="0" r="6" fill="#B8966C" stroke="none"/>
  </g>

  <!-- línea dorada -->
  <rect x="574" y="410" width="52" height="1.5" fill="#B8966C"/>
</svg>
